answer_payment_question:
  description: >
    A customer asked the following question: "{question}"
    Use the Payment Knowledge Search tool to find relevant information before answering.
  expected_output: >
    A clear, direct answer to the customer's question, grounded in the knowledge base,
    citing the source document(s) used (e.g., "according to payment_and_refunds.md").
    If no relevant information is found, say so honestly instead of guessing.
  agent: payment_specialist

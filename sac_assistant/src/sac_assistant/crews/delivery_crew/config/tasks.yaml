answer_delivery_question:
  description: >
    A customer asked the following question: "{question}"
    If order details are already provided in the conversation context, use them to answer
    directly. Otherwise, if the question is about general shipping policies, timeframes, or
    tracking rules, use the Delivery Knowledge Search tool.
  expected_output: >
    A clear, direct answer to the customer's question, WITHOUT mentioning the source
    document or tool inside the answer text itself. If you answered from order details
    provided in the context, set source to "Order Lookup" and include only the details the
    customer asked about. If you used the knowledge base, set the source field to the
    document name used (e.g., "shipping_and_tracking.md"). Set found_answer to true if you
    found relevant grounded information, or false (leaving source empty) if you could not
    find anything relevant and are honestly saying so instead of guessing.
  agent: delivery_specialist